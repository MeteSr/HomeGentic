name: Deploy Mainnet

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install DFX
        uses: dfinity/setup-dfx@main
        with:
          dfx_version: "0.31.0"
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install mops
        run: npm install -g ic-mops
      - name: Install Node dependencies
        run: npm ci
      - name: Deploy to mainnet
        # Network is a positional arg ($1); --network ic would set NETWORK="--network"
        # and silently deploy to local. Must be: bash scripts/deploy.sh ic
        run: bash scripts/deploy.sh ic
        env:
          DFX_IDENTITY_PEM: ${{ secrets.MAINNET_IDENTITY_PEM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOICE_AGENT_API_KEY: ${{ secrets.VOICE_AGENT_API_KEY }}
          VITE_VOICE_AGENT_API_KEY: ${{ secrets.VITE_VOICE_AGENT_API_KEY }}
          VITE_VOICE_AGENT_URL: ${{ secrets.VITE_VOICE_AGENT_URL }}
          BACKUP_CONTROLLER_PRINCIPAL: ${{ secrets.BACKUP_CONTROLLER_PRINCIPAL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}
          OPEN_PERMIT_API_KEY: ${{ secrets.OPEN_PERMIT_API_KEY }}

      - name: Post-deploy cycle health gate
        # Fail the deploy if any canister is critically low on cycles (< 500M).
        # Issue #55: prevents deploying into a degraded state.
        run: bash scripts/check-cycle-health.sh
        env:
          DFX_NETWORK:     ic
          CRITICAL_CYCLES: '500000000'
          WARNING_CYCLES:  '1000000000000'
