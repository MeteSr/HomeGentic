name: Deploy Testnet

on:
  workflow_run:
    workflows: [CI]
    branches: [main, develop]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testnet
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Wallet cycles pre-flight
        run: bash scripts/check-wallet-balance.sh
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}
          DFX_NETWORK: ic
          MIN_WALLET_CYCLES: '5000000000000'

      - name: Deploy to testnet
        run: bash scripts/deploy.sh testnet
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}
          BACKUP_CONTROLLER_PRINCIPAL: ${{ secrets.BACKUP_CONTROLLER_PRINCIPAL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOICE_AGENT_API_KEY: ${{ secrets.VOICE_AGENT_API_KEY }}
          VITE_VOICE_AGENT_API_KEY: ${{ secrets.VITE_VOICE_AGENT_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
