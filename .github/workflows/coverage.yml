name: Code Coverage

on:
  workflow_run:
    workflows: [CI]
    branches: ["**"]
    types: [completed]

permissions:
  contents: read

jobs:
  coverage-frontend:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm install

      - name: Run unit tests with coverage
        run: cd frontend && npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  coverage-backend:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Start local network
        run: icp network start -d

      - name: Deploy canisters
        run: bash scripts/deploy.sh

      - name: Run backend tests
        run: bash scripts/test-backend.sh
