name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  motoko-check:
    name: Motoko compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Motoko dependencies
        run: mops install

      - name: Initialize mops toolchain (downloads moc)
        run: mops toolchain init

      - name: Pre-warm moc binary
        run: |
          MOC_BIN=$(mops toolchain bin moc 2>/dev/null) || MOC_BIN=""
          if [ -z "$MOC_BIN" ]; then
            rm -rf .mops/_tmp && mops toolchain init
            MOC_BIN=$(mops toolchain bin moc)
          fi
          echo "moc: $MOC_BIN"
          "$MOC_BIN" --version

      - name: Install ic-wasm
        run: |
          TMP=$(mktemp -d)
          curl -sSfL \
            https://github.com/dfinity/ic-wasm/releases/download/0.9.11/ic-wasm-x86_64-unknown-linux-musl.tar.xz \
            -o "$TMP/ic-wasm.tar.xz"
          tar -xJf "$TMP/ic-wasm.tar.xz" -C "$TMP"
          BIN=$(find "$TMP" -name "ic-wasm" -type f | head -1)
          sudo install -m 755 "$BIN" /usr/local/bin/ic-wasm
          rm -rf "$TMP"
          ic-wasm --version

      - name: Start local network (needed for canister ID allocation)
        run: icp network start -d

      - name: Compile all Motoko canisters
        # Build every canister except the frontend asset canister.
        # Parse only the canisters: block — networks:/environments: also have
        # "  - name:" entries (e.g. "local", "testnet") which are not canisters.
        run: |
          awk '/^canisters:/{p=1;next} /^[a-z]/{p=0} p && /^  - name:/{print $3}' icp.yaml \
            | grep -v "^frontend$" | grep -v "^internet_identity$" \
            | while read -r canister; do
              echo "=== $canister ==="
              icp build "$canister" || exit 1
            done

  test-backend:
    runs-on: ubuntu-latest
    needs: [motoko-check]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install dfx
        # test-backend uses dfx for local deployment: dfx handles cycle fabrication
        # automatically on local replicas. icp-cli's managed PocketIC network has no
        # cycles infrastructure so icp canister create fails on fresh networks.
        # test-backend.sh also calls `dfx ping`, so dfx must be the active replica.
        run: |
          DFX_VERSION=0.24.3 DFXVM_INIT_YES=1 sh -c "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Motoko dependencies
        run: mops install

      - name: Initialize mops toolchain (downloads moc 1.3.0)
        # dfx 0.24.x uses the mops-managed moc when [toolchain] is set in mops.toml.
        # moc 1.3.0 bundles aaaaa-aa.did internally; dfx's own bundled moc does not.
        run: |
          mops toolchain init
          MOC_BIN=$(mops toolchain bin moc 2>/dev/null) || MOC_BIN=""
          if [ -z "$MOC_BIN" ]; then
            rm -rf .mops/_tmp && mops toolchain init
            MOC_BIN=$(mops toolchain bin moc)
          fi
          "$MOC_BIN" --version

      - name: Debug moc-wrapper and aaaaa-aa.did location
        run: |
          echo "=== dfx cache show ==="
          dfx cache show
          echo "=== dfx cache install ==="
          dfx cache install 2>&1 || true
          echo "=== dfx cache dir contents ==="
          ls "$(dfx cache show)/" 2>/dev/null | head -40 || echo "(still empty)"
          echo "=== dfxvm installation tree ==="
          find "$HOME/.local/share/dfx" -maxdepth 4 2>/dev/null | head -60
          echo "=== moc-wrapper (cache) ==="
          cat "$(dfx cache show)/moc-wrapper" 2>/dev/null \
            || file "$(dfx cache show)/moc-wrapper" 2>/dev/null \
            || echo "not in cache"
          echo "=== find moc-wrapper anywhere ==="
          find "$HOME/.local/share/dfx" -name "moc-wrapper" 2>/dev/null | head -5
          echo "=== find aaaaa-aa.did ==="
          find /home/runner -name "aaaaa-aa.did" 2>/dev/null | head -10 || echo "not found"
          echo "=== mops toolchain bin moc ==="
          mops toolchain bin moc 2>/dev/null || echo "not initialized"

      - name: Start local replica
        run: dfx start --clean --background

      - name: Deploy canisters
        run: |
          DEPLOYER=$(dfx identity get-principal)
          dfx deploy auth --argument "(principal \"$DEPLOYER\")"
          dfx deploy

          # ── Bootstrap admin lists ────────────────────────────────────────────
          for canister in property job contractor quote photo report maintenance market sensor listing agent recurring bills monitoring; do
            dfx canister call "$canister" addAdmin "(principal \"$DEPLOYER\")"
          done
          dfx canister call payment initAdmins "(vec { principal \"$DEPLOYER\" })" || true
          dfx canister call payment grantSubscription "(principal \"$DEPLOYER\", variant { Pro })"

          # ── Wire inter-canister IDs ──────────────────────────────────────────
          PAYMENT_ID=$(dfx canister id payment)
          PROPERTY_ID=$(dfx canister id property)
          PHOTO_ID=$(dfx canister id photo)
          QUOTE_ID=$(dfx canister id quote)
          JOB_ID=$(dfx canister id job)
          CONTRACTOR_ID=$(dfx canister id contractor)
          SENSOR_ID=$(dfx canister id sensor)
          REPORT_ID=$(dfx canister id report)
          BILLS_ID=$(dfx canister id bills)
          MAINTENANCE_ID=$(dfx canister id maintenance)

          dfx canister call job         setPaymentCanisterId    "(\"$PAYMENT_ID\")"
          dfx canister call property    setPaymentCanisterId    "(principal \"$PAYMENT_ID\")"
          dfx canister call photo       setPaymentCanisterId    "(principal \"$PAYMENT_ID\")"
          dfx canister call quote       setPaymentCanisterId    "(principal \"$PAYMENT_ID\")"
          dfx canister call bills       setPaymentCanisterId    "(\"$PAYMENT_ID\")"
          dfx canister call job         setContractorCanisterId "(\"$CONTRACTOR_ID\")"
          dfx canister call job         setPropertyCanisterId   "(\"$PROPERTY_ID\")"
          dfx canister call photo       setPropertyCanisterId   "(principal \"$PROPERTY_ID\")"
          dfx canister call quote       setPropertyCanisterId   "(principal \"$PROPERTY_ID\")"
          dfx canister call maintenance setPropertyCanisterId   "(principal \"$PROPERTY_ID\")"

          # ── Tier propagation wiring ──────────────────────────────────────────
          dfx canister call property addAdmin "(principal \"$PAYMENT_ID\")"
          dfx canister call quote    addAdmin "(principal \"$PAYMENT_ID\")"
          dfx canister call photo    addAdmin "(principal \"$PAYMENT_ID\")"
          dfx canister call payment  setTierCanisterIds \
            "(principal \"$PROPERTY_ID\", principal \"$QUOTE_ID\", principal \"$PHOTO_ID\")"

          # ── Trusted canister lists ───────────────────────────────────────────
          dfx canister call payment    addTrustedCanister "(principal \"$JOB_ID\")"
          dfx canister call payment    addTrustedCanister "(principal \"$PROPERTY_ID\")"
          dfx canister call payment    addTrustedCanister "(principal \"$PHOTO_ID\")"
          dfx canister call payment    addTrustedCanister "(principal \"$QUOTE_ID\")"
          dfx canister call contractor addTrustedCanister "(principal \"$JOB_ID\")"
          dfx canister call property   addTrustedCanister "(principal \"$JOB_ID\")"
          dfx canister call property   addTrustedCanister "(principal \"$PHOTO_ID\")"
          dfx canister call property   addTrustedCanister "(principal \"$QUOTE_ID\")"
          dfx canister call property   addTrustedCanister "(principal \"$REPORT_ID\")"
          dfx canister call job        addTrustedCanister "(principal \"$SENSOR_ID\")"

      - name: Run tests
        run: bash scripts/test-backend.sh

  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # allows posting the coverage comment on PRs
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Unit tests with coverage
        run: cd frontend && npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path:  frontend/vite.config.ts

      - name: Build
        run: cd frontend && npm run build

      - name: SSG pre-render
        run: cd frontend && node scripts/prerender.mjs

  test-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Performance tests
        run: cd frontend && npm run test:perf

  test-e2e:
    runs-on: ubuntu-latest
    # No replica needed: tests run in mock mode (no .env → no canister IDs →
    # all service calls fall back to in-memory mocks). loginWithLocalIdentity()
    # now silently skips fetchRootKey when the replica is absent.
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm install

      - name: Install Playwright browsers
        # Must run AFTER npm install so the locally-pinned @playwright/test
        # version (not the latest npx fallback) determines which Chromium
        # revision is downloaded. Version mismatch causes "Executable doesn't
        # exist" for every test.
        run: cd frontend && npx @playwright/test install --with-deps chromium

      - name: Run E2E tests
        # Playwright's webServer config starts the Vite dev server and waits
        # for it — no need to start it manually. reuseExistingServer is set
        # to true in CI so Playwright owns the server lifecycle.
        run: npm run test:e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
