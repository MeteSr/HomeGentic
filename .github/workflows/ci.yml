name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  motoko-check:
    name: Motoko compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache DFX binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main
        with:
          dfx_version: "0.31.0"

      - name: Cache mops packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Motoko dependencies
        run: mops install

      - name: Start replica (needed for canister create)
        run: dfx start --background --clean

      - name: Create canister stubs
        # Registers canister IDs in local state so dfx build can resolve them.
        # Does not deploy Wasm — just allocates IDs.
        run: dfx canister create --all

      - name: Seed management canister IDL
        # caffeineai-http-outcalls imports ic:aaaaa-aa (the IC management canister).
        # moc looks for aaaaa-aa.did in .dfx/local/canisters/idl/ but dfx canister create
        # does not generate it. The minimal IDL is committed at .github/candid/aaaaa-aa.did.
        run: |
          mkdir -p .dfx/local/canisters/idl
          cp .github/candid/aaaaa-aa.did .dfx/local/canisters/idl/aaaaa-aa.did

      - name: Compile all Motoko canisters
        # Build every canister whose type is not "assets" (i.e. all Motoko
        # canisters). The frontend asset canister is excluded — its TypeScript
        # build is already verified in the test-frontend job.
        # jq is pre-installed on all GitHub-hosted runners.
        run: |
          jq -r '.canisters | to_entries[] | select(.value.type != "assets" and .value.type != "pull") | .key' dfx.json | \
          while read -r canister; do dfx build "$canister" || exit 1; done

  test-backend:
    runs-on: ubuntu-latest
    needs: [motoko-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache DFX binary
        id: cache-dfx
        uses: actions/cache@v4
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main
        with:
          dfx_version: "0.31.0"

      - name: Cache mops packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Start replica
        run: dfx start --background --clean

      - name: Deploy canisters
        run: bash scripts/deploy.sh

      - name: Run tests
        run: bash scripts/test-backend.sh

  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # allows posting the coverage comment on PRs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Unit tests with coverage
        run: cd frontend && npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path:  frontend/vite.config.ts

      - name: Build
        run: cd frontend && npm run build

      - name: SSG pre-render
        run: cd frontend && node scripts/prerender.mjs

  test-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Performance tests
        run: cd frontend && npm run test:perf

  test-e2e:
    runs-on: ubuntu-latest
    # No DFX/replica needed: tests run in mock mode (no .env → no canister IDs →
    # all service calls fall back to in-memory mocks). loginWithLocalIdentity()
    # now silently skips fetchRootKey when the replica is absent.
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm install

      - name: Install Playwright browsers
        # Must run AFTER npm install so the locally-pinned @playwright/test
        # version (not the latest npx fallback) determines which Chromium
        # revision is downloaded. Version mismatch causes "Executable doesn't
        # exist" for every test.
        run: cd frontend && npx @playwright/test install --with-deps chromium

      - name: Run E2E tests
        # Playwright's webServer config starts the Vite dev server and waits
        # for it — no need to start it manually. reuseExistingServer is set
        # to true in CI so Playwright owns the server lifecycle.
        run: npm run test:e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
