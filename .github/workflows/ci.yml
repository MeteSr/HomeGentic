name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  motoko-check:
    name: Motoko compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache DFX binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main

      - name: Cache mops packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Motoko dependencies
        run: mops install

      - name: Compile all canisters
        # dfx build runs moc on every main.mo without starting a replica.
        # Catches type errors, unused non-unit returns, and bad imports
        # before the slower test-backend job spins up a replica.
        run: dfx build --all

  test-backend:
    runs-on: ubuntu-latest
    needs: [motoko-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache DFX binary
        id: cache-dfx
        uses: actions/cache@v4
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main

      - name: Cache mops packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Start replica
        run: dfx start --background --clean

      - name: Deploy canisters
        run: bash scripts/deploy.sh

      - name: Run tests
        run: bash scripts/test-backend.sh

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Unit tests
        run: cd frontend && npm run test:unit

      - name: Build
        run: cd frontend && npm run build

      - name: SSG pre-render
        run: cd frontend && node scripts/prerender.mjs

  test-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Performance tests
        run: cd frontend && npm run test:perf

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-frontend, motoko-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache DFX binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main

      - name: Cache mops packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - run: npm install

      - name: Start replica and deploy
        run: |
          dfx start --background --clean
          bash scripts/deploy.sh

      - name: Run E2E tests
        # Playwright's webServer config starts the Vite dev server and waits
        # for it — no need to start it manually. reuseExistingServer is set
        # to true in CI so Playwright owns the server lifecycle.
        run: npm run test:e2e
        env:
          DFX_NETWORK: local

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
