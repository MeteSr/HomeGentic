name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache DFX binary
        id: cache-dfx
        uses: actions/cache@v5
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Start replica
        run: dfx start --background --clean

      - name: Deploy canisters
        run: bash scripts/deploy.sh

      - name: Run tests
        run: bash scripts/test-backend.sh

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm install

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Unit tests
        run: cd frontend && npm run test:unit

      - name: Build
        run: cd frontend && npm run build

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache DFX binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/dfinity
          key: dfx-${{ runner.os }}-${{ hashFiles('dfx.json') }}

      - name: Install DFX
        uses: dfinity/setup-dfx@main

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - run: npm install

      - name: Start replica and deploy
        run: |
          dfx start --background --clean
          bash scripts/deploy.sh

      - name: Start frontend dev server
        run: cd frontend && npm run dev &
        env:
          DFX_NETWORK: local

      - name: Wait for frontend
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
